<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Creativity </title>
    <meta name="description"  content="my page for Networking ">
    <meta name="keywords" content="network"/>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/3598/3598209.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* إضافة تنسيق مخصص لزر تسجيل الخروج/حالة المسؤول */
        .admin-status-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #2ecc71;
            color: white;
            padding: 10px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none;
            z-index: 10000;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <button type="button" class="admin-login-btn" id="loginBtn" onclick="loginAsAdmin()">
        <i class="fa-solid fa-lock"></i> Login as Admin
    </button>

    <div class="admin-status-badge" id="statusBadge" onclick="logoutAdmin()">
        <i class="fa-solid fa-user-shield"></i> Admin Active (Click to Logout)
    </div>

    <h1 class="welcome">Welcome </h1>
    <h1 class="site-title">Creativity Center</h1>
    <h1 class="defintion">This website for networking </h1>

    <div>
        <form action="">
            <button type="button" class="install" onclick="window.location.href='index-1.html'">
                Installation
            </button>   

            <button type="button" class="maintenance" onclick="window.location.href='index-2.html'">
                Maintenance
            </button><br>

            <button type="button" class="admin" onclick="window.location.href='index-3.html'">
                Administration
            </button>
            
            <button type="button" class="about" onclick="window.location.href='index-4.html'">
                About Us
            </button>
        </form>
    </div>

    <div class="social-links">
        <a href="https://www.facebook.com/share/1DEsTXfEzs/" target="_blank">
            <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="https://wa.me/201552250338" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
    </div>

    <script>
    // التحقق من حالة الدخول عند تحميل الصفحة
    document.addEventListener("DOMContentLoaded", () => {
        checkAdminStatus();
    });

    function checkAdminStatus() {
        const isAdmin = sessionStorage.getItem("isAdmin");
        const loginBtn = document.getElementById("loginBtn");
        const statusBadge = document.getElementById("statusBadge");

        if (isAdmin === "true") {
            if(loginBtn) loginBtn.style.display = "none";
            if(statusBadge) statusBadge.style.display = "block";
        } else {
            if(loginBtn) loginBtn.style.display = "block";
            if(statusBadge) statusBadge.style.display = "none";
        }
    }

    function loginAsAdmin() {
        Swal.fire({
            title: 'Admin Authorization',
            input: 'password',
            inputPlaceholder: 'Enter Admin Secret Key',
            inputAttributes: { autocapitalize: 'off', autocorrect: 'off' },
            showCancelButton: true,
            confirmButtonText: 'Access Terminal',
            confirmButtonColor: '#0072ff'
        }).then((result) => {
            if (result.value === '2532006') { 
                sessionStorage.setItem("isAdmin", "true");
                Swal.fire({
                    title: 'Access Granted!',
                    text: 'You are now logged in as System Administrator.',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    checkAdminStatus(); // تحديث أزرار الصفحة فوراً
                });
            } else if (result.value !== undefined) {
                Swal.fire('Access Denied', 'Incorrect security key provided.', 'error');
            }
        });
    }

    // إمكانية تسجيل الخروج للمسؤول للعودة كزائر عادي
    function logoutAdmin() {
        Swal.fire({
            title: 'Logout?',
            text: "Are you sure you want to end admin session?",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'Yes, Logout'
        }).then((result) => {
            if (result.isConfirmed) {
                sessionStorage.removeItem("isAdmin");
                Swal.fire('Logged Out', 'Admin session terminated.', 'info').then(() => {
                    checkAdminStatus();
                });
            }
        });
    }
    </script>
</body>
</html>
