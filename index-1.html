<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Installation Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
body { text-align: center; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; margin: 0; padding: 50px 20px; min-height: 100vh; }
h1 { font-size: 2.5rem; margin-bottom: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
.btn-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 40px; }
button.main-btn { width: 240px; height: 55px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-new { background: #ffffff; color: #1e3c72; }
.btn-cancel { background: #ff4d4d; color: white; }
button.main-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; }
.modal-content { background: white; width: 100%; max-width: 480px; padding: 30px; border-radius: 20px; margin: 50px auto; text-align: left; color: #333; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #aaa; transition: 0.2s; }
.close:hover { color: #000; }
label { font-weight: bold; display: block; margin-top: 15px; color: #444; font-size: 14px; }
input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; border: 1.5px solid #ddd; border-radius: 8px; outline: none; transition: 0.3s; font-size: 15px; }
input:focus, select:focus, textarea:focus { border-color: #2a5298; box-shadow: 0 0 8px rgba(42, 82, 152, 0.2); }
textarea { resize: vertical; height: 80px; }
.save-btn { width: 100%; background: #2a5298; color: white; font-size: 18px; border: none; border-radius: 10px; padding: 12px; margin-top: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
.save-btn:hover { background: #1e3c72; }

/* Admin Logs (Visible only to Admin) */
.logs-container { display: none; max-width: 1000px; margin: 20px auto; background: white; color: #333; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); text-align: left; }
.logs-container h2 { color: #1e3c72; margin-bottom: 15px; font-size: 22px; display: flex; align-items: center; gap: 10px; }
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; text-align: left; font-size: 14px; }
th { background-color: #f4f6f9; color: #1e3c72; font-weight: bold; }
.ticket-code { background: #e2e8f0; padding: 3px 8px; border-radius: 5px; font-family: monospace; font-weight: bold; color: #0f172a; }
.home-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 8px 16px; border-radius: 8px; cursor: pointer; float: left; transition: 0.3s; text-decoration: none; font-size: 14px; }
.home-btn:hover { background: white; color: #1e3c72; }
</style>
</head>
<body>

<a href="index.html" class="home-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a><br><br>

<h1><i class="fa-solid fa-screwdriver-wrench"></i> Installation Request System</h1>

<div class="btn-container">
    <button class="main-btn btn-new" onclick="openForm('new')">
        <i class="fa-solid fa-plus"></i> New Installation Request
    </button>
    <button class="main-btn btn-cancel" onclick="openForm('cancel')">
        <i class="fa-solid fa-trash-can"></i> Cancel Request by Code
    </button>
</div>

<div id="myForm" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeForm()">&times;</span>
        <h2 id="modalTitle" style="margin-top: 0; color: #1e3c72;"><i class="fa-solid fa-file-invoice"></i> Request Details</h2>
        <form id="installationForm" onsubmit="handleSubmit(event)">
            <div id="dynamicFields"></div>
            <button type="submit" id="submitBtn" class="save-btn">Send Request</button>
        </form>
    </div>
</div>

<div class="logs-container" id="adminLogSection">
    <h2><i class="fa-solid fa-folder-open"></i> Live Active Installations (Admin Core View)</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Request Code</th>
                    <th>Device Type</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Location</th>
                    <th>Setup Notes</th>
                    <th>Actions</th> <!-- عمود الحذف الجديد -->
                </tr>
            </thead>
            <tbody id="logsTableBody"></tbody>
        </table>
    </div>
</div>
<script>
let currentType = 'new';

document.addEventListener("DOMContentLoaded", () => {
    // التحقق من هوية المسؤول لتشغيل اللوحة الخاصة بك
    if(sessionStorage.getItem("isAdmin") === "true") {
        document.getElementById("adminLogSection").style.display = "block";
        displayRequests();
    }
});

function openForm(type){
    currentType = type;
    const modal = document.getElementById("myForm");
    const title = document.getElementById("modalTitle");
    const submitBtn = document.getElementById("submitBtn");
    const dynamicFields = document.getElementById("dynamicFields");
    
    modal.style.display = "block";
    
    if(type === 'new') {
        title.innerHTML = `<i class="fa-solid fa-plus-circle"></i> New Installation`;
        submitBtn.innerHTML = `Submit Ticket`;
        submitBtn.style.background = "#2a5298";
        
        dynamicFields.innerHTML = `
            <label><i class="fa-solid fa-microchip"></i> Device Type</label>
            <select id="field_device" required>
                <option value="">-- Select Device --</option>
                <option>Router</option>
                <option>Switch</option>
                <option>Access Point</option>
                <option>Server</option>
            </select>
            <label><i class="fa-solid fa-user"></i> Customer Name</label>
            <input type="text" id="field_name" placeholder="Enter customer full name" required>
            <label><i class="fa-solid fa-phone"></i> Phone Number</label>
            <input type="text" id="field_phone" placeholder="Enter phone number" required>
            <label><i class="fa-solid fa-location-dot"></i> Location</label>
            <input type="text" id="field_location" placeholder="Enter installation location" required>
            <label><i class="fa-solid fa-comment-dots"></i> Requirements / Notes</label>
            <textarea id="field_details" placeholder="Enter any specific requirements..." required></textarea>
        `;
    } else {
        title.innerHTML = `<i class="fa-solid fa-ban"></i> Cancel Ticket`;
        submitBtn.innerHTML = `Confirm Cancellation`;
        submitBtn.style.background = "#ff4d4d";
        
        dynamicFields.innerHTML = `
            <label><i class="fa-solid fa-hashtag"></i> Enter Ticket Code</label>
            <input type="text" id="cancel_code" placeholder="e.g. INS-4820" required>
            <label><i class="fa-solid fa-user"></i> Customer Name (Verification)</label>
            <input type="text" id="cancel_name" placeholder="Enter full name registered" required>
        `;
    }
}

function closeForm(){
    document.getElementById("myForm").style.display = "none";
    document.getElementById("installationForm").reset();
}

window.onclick = function(event){
    let modal = document.getElementById("myForm");
    if(event.target == modal){ closeForm(); }
}

function handleSubmit(event) {
    event.preventDefault(); 
    let existingRequests = JSON.parse(localStorage.getItem("installRequests")) || [];

    if(currentType === 'new') {
        const generatedCode = "INS-" + Math.floor(1000 + Math.random() * 9000);
        const newRequest = {
            id: generatedCode,
            device: document.getElementById("field_device").value,
            name: document.getElementById("field_name").value,
            phone: document.getElementById("field_phone").value,
            location: document.getElementById("field_location").value,
            details: document.getElementById("field_details").value
        };

        existingRequests.push(newRequest);
        localStorage.setItem("installRequests", JSON.stringify(existingRequests));
        
        closeForm(); 
        if(sessionStorage.getItem("isAdmin") === "true") displayRequests();

        Swal.fire({
            title: 'Created Successfully!',
            html: `Your individual Ticket ID is: <b style="color:#2a5298; font-size:22px;">${generatedCode}</b>.<br>Provide this code to modify or cancel your operation.`,
            icon: 'success',
            confirmButtonText: 'Got It',
            confirmButtonColor: '#2a5298'
        });
    } else {
        const codeInput = document.getElementById("cancel_code").value.trim().toUpperCase();
        const nameInput = document.getElementById("cancel_name").value.trim().toLowerCase();
        const recordIndex = existingRequests.findIndex(req => req.id === codeInput && req.name.trim().toLowerCase() === nameInput);

        if (recordIndex !== -1) {
            existingRequests.splice(recordIndex, 1);
            localStorage.setItem("installRequests", JSON.stringify(existingRequests));
            closeForm();
            if(sessionStorage.getItem("isAdmin") === "true") displayRequests();

            Swal.fire({
                title: 'Terminated',
                text: `Ticket ${codeInput} has been successfully canceled.`,
                icon: 'success',
                confirmButtonColor: '#ff4d4d'
            });
        } else {
            Swal.fire('Error', 'No matching credentials found.', 'error');
        }
    }
}

function displayRequests() {
    const tableBody = document.getElementById("logsTableBody");
    let existingRequests = JSON.parse(localStorage.getItem("installRequests")) || [];
    tableBody.innerHTML = "";
    if (existingRequests.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999;">No active installation tickets.</td></tr>`;
        return;
    }
    existingRequests.forEach(req => {
        tableBody.innerHTML += `
            <tr>
                <td><span class="ticket-code">${req.id}</span></td>
                <td><strong>${req.device}</strong></td>
                <td>${req.name}</td>
                <td>${req.phone}</td>
                <td>${req.location}</td>
                <td>${req.details}</td>
            </tr>`;
    });
}
function displayRequests() {
    const tableBody = document.getElementById("logsTableBody");
    let existingRequests = JSON.parse(localStorage.getItem("installRequests")) || [];
    tableBody.innerHTML = "";
    
    if (existingRequests.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#999;">No active installation tickets.</td></tr>`;
        return;
    }
    
    existingRequests.forEach((req, index) => {
        tableBody.innerHTML += `
            <tr>
                <td><span class="ticket-code">${req.id}</span></td>
                <td><strong>${req.device}</strong></td>
                <td>${req.name}</td>
                <td>${req.phone}</td>
                <td>${req.location}</td>
                <td>${req.details}</td>
                <td>
                    <button onclick="deleteRequest(${index}, 'install')" style="background:#ff4d4d; color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; width:auto; height:auto; font-size:12px; margin:0;">
                        <i class="fa-solid fa-trash"></i> Delete
                    </button>
                </td>
            </tr>`;
    });
}

function deleteRequest(index, type) {
    Swal.fire({
        title: 'Are you sure?',
        text: "This ticket will be permanently removed from the system!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4d4d',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes, delete it!'
    }).then((result) => {
        if (result.isConfirmed) {
            let key = type === 'install' ? "installRequests" : "";
            let requests = JSON.parse(localStorage.getItem(key)) || [];
            requests.splice(index, 1);
            localStorage.setItem(key, JSON.stringify(requests));
            displayRequests(); // إعادة تحديث الجدول فوراً
            Swal.fire('Deleted!', 'The task has been removed.', 'success');
        }
    });
}
</script>
</body>
</html>
