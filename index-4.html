<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    color:#333;
}

/* عنوان الصفحة */
.page-title{
    text-align:center;
    font-size:50px;
    color:blueviolet;
    margin:20px 0;
}

/* الصورة الرئيسية */
.hero{
    width:90%;
    height:350px;
    background:url("g.png") center/cover no-repeat;
    margin:auto;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* قسم التعريف */
.about{
    max-width:900px;
    margin:40px auto;
    text-align:center;
    padding:20px;
}

.about h2{
    color:blueviolet;
    font-size:35px;
    margin-bottom:15px;
}

.about p{
    font-size:20px;
    line-height:1.8;
}

/* معرض الصور */
.gallery{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px 0 40px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* الفوتر */
footer{
    background:blueviolet;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:20px;
}

</style>
</head>

<body>

<h1 class="page-title">About Us</h1>

<div class="hero"></div>

<section class="about">
    <h2>Who We Are</h2>

    <p>
        Welcome to our website. We are passionate about providing
        excellent services and creating innovative solutions that help
        our customers achieve their goals. Our team is dedicated to
        quality, creativity, and customer satisfaction.
    </p>
</section>

<div class="gallery">
    <img src="z.webp" alt="Image 1">
    <img src="x.webp" alt="Image 2">
    <img src="c.webp" alt="Image 3">
    <img src="v.webp" alt="Image 4">
    <img src="b.webp" alt="Image 5">
</div>

<footer>
    © 2026 All Rights Reserved
</footer>

</body>
</html>
