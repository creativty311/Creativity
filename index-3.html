<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Administrator</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
body { text-align:center; background:linear-gradient(135deg, #6a11cb, #2575fc); font-family:Arial, sans-serif; color:white; padding: 20px; }
button.trigger-btn { width:220px; height:50px; font-size:18px; border:none; border-radius:12px; cursor:pointer; margin-top:30px; background:white; color:#333; font-weight:bold; transition:0.3s; }
button.trigger-btn:hover { transform:scale(1.05); }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; }
.modal-content { background:white; width:420px; padding:25px; border-radius:15px; margin:80px auto; text-align:left; color:black; animation:pop 0.3s ease-in-out; position: relative; }
@keyframes pop { from{transform:scale(0.7); opacity:0;} to{transform:scale(1); opacity:1;} }
.close { float:right; font-size:28px; cursor:pointer; font-weight:bold; color: #aaa; }
.close:hover { color: #000; }
input, select { width:100%; padding:10px; margin-top:6px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px; outline:none; }
input:focus, select:focus { border-color:#2575fc; }
label { font-weight:bold; }
.save-btn { width:100%; background:#2575fc; color:white; font-size:18px; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.save-btn:hover { background:#1a5fd4; }
.logs-container { max-width: 1000px; margin: 40px auto; background: white; color: #333; padding: 25px; border-radius: 15px; text-align: left; }
.logs-container h2 { color: #6a11cb; margin-bottom: 15px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
th { background: #f4f6f9; color: #6a11cb; }
.ticket-code { background: #eee; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; }
.delete-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
.home-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid white; padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-block;  }
</style>
</head>

<body>
<a href="index.html" class="home-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a><br><br>

<h1>Submit a request to the network administrator</h1>

<button class="trigger-btn" onclick="openForm()">New Submit</button>

<div id="myForm" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeForm()">&times;</span>
        <h2>Submit Administrative Request</h2>
        <form id="adminForm" onsubmit="handleAdminSubmit(event)">
            <label>Device Type</label>
            <select id="adm_device" required>
                <option value="">-- Select Device --</option>
                <option>Router</option>
                <option>Switch</option>
                <option>Access Point</option>
                <option>Server</option>
            </select>

            <label>Customer Name</label>
            <input type="text" id="adm_name" placeholder="Enter customer full name" required>

            <label>Phone Number</label>
            <input type="text" id="adm_phone" placeholder="Enter phone number" required>

            <label>Location</label>
            <input type="text" id="adm_location" placeholder="Enter location" required>

            <label>Problem Description</label>
            <input type="text" id="adm_details" placeholder="Describe the issue" required>

            <button type="submit" class="save-btn">Send Request</button>
        </form>
    </div>
</div>

<div class="logs-container">
    <h2><i class="fa-solid fa-shield-halved"></i> Global Administrator Requests Queue (Live Cloud)</h2>
    <table>
        <thead>
            <tr>
                <th>Ticket ID</th>
                <th>Device</th>
                <th>Customer Name</th>
                <th>Phone</th>
                <th>Location</th>
                <th>Problem Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="logsTableBody"></tbody>
    </table>
</div>

<script>
// كود الإعدادات الخاص بقاعدة بياناتك مأخوذ من ddddd.png
const firebaseConfig = {
    apiKey: "AIzaSyBV93xGbKln5RcaPP9VOTlmh5auKD04Zms",
    authDomain: "creatitity-d09f7.firebaseapp.com",
    databaseURL: "https://creatitity-d09f7-default-rtdb.firebaseio.com",
    projectId: "creatitity-d09f7",
    storageBucket: "creatitity-d09f7.appspot.com",
    messagingSenderId: "591631410491",
    appId: "1:591631410491:web:ff000c0a8d2f030f57031e"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

document.addEventListener("DOMContentLoaded", listenToLiveRequests);

function openForm(){ document.getElementById("myForm").style.display="block"; }
function closeForm(){ document.getElementById("myForm").style.display="none"; document.getElementById("adminForm").reset(); }

window.onclick = function(event){
    let modal = document.getElementById("myForm");
    if(event.target == modal){ closeForm(); }
}

function handleAdminSubmit(event) {
    event.preventDefault();
    const ticketId = "ADM-" + Math.floor(1000 + Math.random() * 9000);

    const requestData = {
        id: ticketId,
        device: document.getElementById("adm_device").value,
        name: document.getElementById("adm_name").value,
        phone: document.getElementById("adm_phone").value,
        location: document.getElementById("adm_location").value,
        details: document.getElementById("adm_details").value
    };

    database.ref('adminRequests/' + ticketId).set(requestData)
    .then(() => {
        closeForm();
        Swal.fire('Dispatched Securely', `Admin Task ${ticketId} is now live!`, 'success');
    });
}

function listenToLiveRequests() {
    database.ref('adminRequests').on('value', (snapshot) => {
        const tableBody = document.getElementById("logsTableBody");
        tableBody.innerHTML = "";
        const data = snapshot.val();
        
        if(!data) {
            tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#aa;p">No core admin records pending.</td></tr>`;
            return;
        }

        Object.keys(data).forEach(key => {
            const req = data[key];
            tableBody.innerHTML += `
                <tr>
                    <td><span class="ticket-code">${req.id}</span></td>
                    <td><strong>${req.device}</strong></td>
                    <td>${req.name}</td>
                    <td>${req.phone}</td>
                    <td>${req.location}</td>
                    <td>${req.details}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteAdminTicket('${req.id}')">Wipe</button>
                    </td>
                </tr>
            `;
        });
    });
}

function deleteAdminTicket(id) {
    Swal.fire({
        title: 'Wipe from Server?',
        text: "Permanent data destruction!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4d4d',
        confirmButtonText: 'Yes, Wipe'
    }).then((result) => {
        if(result.isConfirmed) {
            database.ref('adminRequests/' + id).remove();
        }
    });
}
</script>
</body>
</html>
